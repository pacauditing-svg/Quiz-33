<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>اختبار القانون 33</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#d0d0d0;font-family:Arial,sans-serif;padding:15px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{background:white;border-radius:20px;padding:25px;max-width:750px;width:100%;border:1px solid #ccc;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.title{font-size:1.8rem;color:#0a2a4a;text-align:center;font-weight:800;}
.sub{font-size:1.1rem;color:#0a2a4a;text-align:center;margin:5px 0;}
.preptext{font-size:0.95rem;color:#c62828;text-align:center;margin:8px 0;font-weight:500;}
.prep{font-size:1rem;color:#0a2a4a;text-align:center;border-top:1px solid #ccc;padding-top:12px;margin:12px 0;}
.count{font-size:1.3rem;font-weight:700;color:#0a2a4a;text-align:center;margin:12px 0;}
.disc{background:#fff8e1;padding:12px;border-radius:12px;font-size:0.8rem;color:#555;text-align:center;margin:12px 0;border-right:4px solid #0a2a4a;}
.startbtn{background:#0a2a4a;color:white;border:none;padding:14px;border-radius:12px;font-size:1.1rem;font-weight:bold;cursor:pointer;display:block;margin:15px auto;width:100%;max-width:280px;}
.startbtn:active{transform:scale(0.96);}
.progress{display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:8px;}
.qcounter,.qscore{background:#0a2a4a;color:white;padding:5px 14px;border-radius:12px;font-weight:bold;font-size:0.85rem;}
.qscore{background:#c62828;}
.qtext{font-size:1.2rem;font-weight:700;margin:15px 0 20px;color:#0a2a4a;line-height:1.5;text-align:right;}
.options{list-style:none;padding:0;margin:0 0 15px 0;}
.opt{background:white;border:1px solid #ccc;border-radius:12px;padding:12px 16px;margin-bottom:10px;cursor:pointer;text-align:right;font-size:0.95rem;color:#333;display:flex;align-items:center;gap:12px;}
.opt:active{background:#eef2f7;}
.opt .prefix{background:#cbd5e1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:bold;flex-shrink:0;}
.opt.correct{background:#bbf7d0;border-color:#15803d;color:#14532d;}
.opt.correct .prefix{background:#15803d;color:white;}
.opt.wrong{background:#ffe4e2;border-color:#b91c1c;color:#7f1a1a;text-decoration:line-through;}
.opt.wrong .prefix{background:#b91c1c;color:white;}
.opt.disabled{opacity:0.8;cursor:default;}
.feedback{border-radius:12px;padding:12px;margin:10px 0;text-align:center;font-size:0.9rem;display:none;}
.fbgood{background:#dcfce7;color:#166534;display:block;border-right:4px solid #22c55e;}
.fbbad{background:#fee2e2;color:#991b1b;display:block;border-right:4px solid #ef4444;}
.actions{display:flex;gap:10px;margin-top:15px;}
.nav{background:#e0e0e0;border:1px solid #ccc;padding:10px;border-radius:12px;font-size:0.95rem;font-weight:bold;color:#333;cursor:pointer;flex:1;text-align:center;}
.nav:active{transform:scale(0.96);}
.next{background:#0a2a4a;color:white;border:none;}
.submit{background:#c62828;color:white;border:none;}
.result-title{font-size:1.8rem;color:#0a2a4a;text-align:center;font-weight:800;}
.final-score{font-size:2.5rem;font-weight:800;color:#0a2a4a;text-align:center;margin:15px 0;}
.final-msg{font-size:1rem;text-align:center;color:#333;margin-bottom:15px;}
.btn-restart{background:#0a2a4a;color:white;border:none;padding:12px;border-radius:12px;font-size:1rem;cursor:pointer;display:block;margin:10px auto;width:100%;max-width:250px;}
.btn-restart:active{transform:scale(0.96);}
.footer-disc{font-size:0.7rem;color:#888;margin-top:15px;padding:10px;border-top:1px solid #ccc;text-align:center;}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
var QUESTIONS = [
{text:"المحاسب القانوني هو:",options:["من يحمل إجازة في الاقتصاد ويمارس أعمال المحاسبة ومنتسب للتنظيم المهني.","من حصل على شهادة المحاسب القانوني وفق الأحكام القانونية النافذة.","غير ذلك."],correct:1},
{text:"مدقق الحسابات هو:",options:["من يحمل إجازة في الاقتصاد ويمارس أعمال المحاسبة ومنتسب للتنظيم المهني.","من حصل على شهادة المحاسب القانوني وفق الأحكام القانونية النافذة.","المحاسب القانوني المرخص لتدقيق ومراجعة الحسابات سواءً أكان شخصاً طبيعياً يزاول باسمه أو لحساب شركة مهنية وعلى مسؤوليته لمهنة تدقيق الحسابات وإبداء الرأي حول مدى تمثيلها بعدالة للمركز المالي للجهة المدققة."],correct:2},
{text:"'تدقيق البيانات المالية' وفقاً للقانون هو:",options:["فحص الدفاتر اليومية فقط.","فحص البيانات المالية بهدف إبداء الرأي فيما إذا كانت قد أعدت من كافة النواحي الجوهرية وفقاً لمعايير محاسبية محددة.","إعداد القيود المحاسبية اليومية."],correct:1},
{text:"أي من التالي لا يعتبر من خدمات التدقيق التي تشمل مهنة المحاسب القانوني؟",options:["تدقيق ومراجعة البيانات المالية.","إعداد البيان الضريبي.","توظيف المحاسبين الجدد."],correct:2},
{text:"الرخصة هي الوثيقة التي تخول صاحبها الحق في مزاولة المهنة وفق أحكام القانون /33/ وتصدر عن:",options:["التنظيم المهني.","مجلس المحاسبة والتدقيق.","وزارة المالية."],correct:0},
{text:"يهدف مجلس المحاسبة والتدقيق الى:",options:["الإشراف على مهنة المحاسبة والتدقيق للارتقاء بمستوى أدائها.","التأكيد على مستوى جودة ودقة عمل شركات المهنة ومدققي الحسابات في سورية.","الرقابة على الأعمال المحاسبية والمالية تدعيماً للثقة في أنشطة المحاسبة والتدقيق.","جميع ما سبق."],correct:3},
{text:"الشركة المهنية وفق أحكام هذا القانون هي:",options:["شركة مدنية أو شركة مهنية محدودة المسؤولية مسجلة وفق القوانين النافذة.","شركة مساهمة عامة.","مؤسسة فردية حصراً."],correct:0},
{text:"خدمات وضع النظم المالية والمحاسبية للمؤسسات والشركات تعتبر من:",options:["خدمات التدقيق الإلزامي.","خدمات التقييم فقط.","خدمات التدقيق التي تشمل مهنة المحاسب القانوني."],correct:2},
{text:"من هو المدقق الداخلي؟",options:["هو المحاسب القانوني المرخص.","هو ممثل الشركة.","شخص يعمل بانتظام لدى الجهة المدققة."],correct:2},
{text:"ما هو تعريف التدقيق الداخلي وفق القانون؟",options:["إعداد التقارير الربعية فقط.","تدقيق حسابات العملاء الخارجيين.","فحص وتقييم مدى كفاية وفعالية أنظمة الرقابة الداخلية وجودة الأداء عند تأدية الأنشطة المختلفة."],correct:2},
{text:"كيف تتم تسمية أعضاء مجلس المحاسبة والتدقيق؟",options:["بقرار من وزير المالية بناءً على اقتراح جمعية المحاسبين القانونيين.","بقرار يصدر عن السيد رئيس الجمهورية بناءً على اقتراح وزير المالية.","بقرار يصدر عن رئيس مجلس الوزراء بناءً على اقتراح وزير المالية."],correct:2},
{text:"ما هي شروط منح شهادة محاسب قانوني من حيث اجتياز الامتحان؟",options:["أن يجتاز بنجاح امتحاناً تجريه لجنة القبول وفقاً للشروط والقواعد التي يحددها المجلس.","يجوز للمجلس أن يصدر قراراً بمعادلة شهادات المحاسبة من جمعيات أو معاهد معتمدة دولياً ويخضع المتقدم بطلب المعادلة لمواد الامتحانات المتعلقة بالقوانين السورية التي يحددها المجلس.","جميع ما سبق."],correct:2},
{text:"من هو رئيس مجلس المحاسبة والتدقيق حسب نص المادة /2/ من القانون /33/؟",options:["وزير المالية.","معاون وزير المالية.","يعيّن بقرار من رئيس مجلس الوزراء بناءً على اقتراح وزير المالية."],correct:0},
{text:"أي من التالي ليس من اختصاصات مجلس المحاسبة والتدقيق؟",options:["اعتماد السياسات التدريبية للارتقاء بمستوى المهنة.","إصدار تراخيص مزاولة المهنة للأفراد مباشرة.","إجراء البحوث لسلامة تطبيق معايير المحاسبة الدولية."],correct:1},
{text:"وفق المادة /5/، من الذي يقوم بالرقابة على مكاتب وشركات المحاسبة والمراجعة بالتعاون مع التنظيم المهني؟",options:["وزارة المالية فقط.","وزارة الاقتصاد.","مجلس المحاسبة والتدقيق."],correct:2},
{text:"من الجهة المخولة بإصدار القرارات الخاصة بتفسير قواعد مزاولة المهنة وتعديلها؟",options:["وزارة العدل.","مجلس المحاسبة والتدقيق.","التنظيم المهني فقط."],correct:1},
{text:"مجلس المحاسبة والتدقيق هو الجهة المسؤولة عن:",options:["تعيين المحاسبين في القطاع العام.","إجراء الامتحانات الجامعية.","اعتماد الإطار العام لمقررات الامتحانات المنصوص عليها في القانون."],correct:2},
{text:"يحق لمجلس المحاسبة والتدقيق إضافة خدمات أخرى تشملها مهنة التدقيق والمراجعة وفق:",options:["رغبة الوزير.","رغبة المحاسبين فقط.","المعايير الدولية."],correct:2},
{text:"يختص المجلس بـ 'تحديد البدلات الواجب تحصيلها لصالح التنظيم المهني' بناءً على اقتراح:",options:["مجلس إدارة التنظيم المهني.","وزارة المالية.","لجنة التأديب."],correct:0},
{text:"المجلس هو الذي يلزم الجهات ذات العلاقة بتطبيق معايير المحاسبة الدولية بناءً على:",options:["طلب من الجهات الرسمية.","توصيات البنك المركزي.","خطة محددة زمنياً يضعها المجلس."],correct:2},
{text:"يختص المجلس بـالعمل على عقد المؤتمرات العلمية والمهنية مع:",options:["المنظمات العربية والدولية في مجال المحاسبة والتدقيق.","الشركات المحلية فقط.","الاتحاد العام لنقابات العمال."],correct:0},
{text:"من هم أعضاء مجلس المحاسبة والتدقيق حسب المادة /2/؟ (اختر الإجابة الأكثر دقة)",options:["جميعهم من وزارة المالية فقط.","يضم ممثلين عن وزارة المالية، هيئة الإشراف على التأمين، سوق دمشق وهيئة الأوراق والأسواق المالية، المصرف المركزي، وزارة الاقتصاد، التنظيم المهني، الجهاز المركزي للرقابة المالية، عضو هيئة تدريسية، خبراء بالمهنة والمعايير وخبراء بالصناعة والتجارة.","جميعهم من المحاسبين القانونيين فقط."],correct:1},
{text:"تعتبر من اهداف مجلس التدقيق ماعدا:",options:["الاشراف على مهنة المحاسبة والتدقيق.","عقد مؤتمرات علمية ومهنية مع المنظمات العربية بمجال المحاسبة والتدقيق.","الرقابة على الاعمال المحاسبية والمالية."],correct:1},
{text:"هل يجوز تغيير أي من أعضاء المجلس بتعيين بديل له قبل انتهاء مدة عضويته؟",options:["نعم، يجوز للمدة المتبقية من عضويته وبنفس الطريقة التي عين بها.","نعم، ولكن فقط بقرار من رئيس الجمهورية.","لا، إلا إذا استقال العضو."],correct:0},
{text:"ما هي الشروط القانونية لمنح شهادة محاسب قانوني للأشخاص الطبيعيين؟",options:["ان يكون عربياً سورياً أو من في حكمه منذ أكثر من عشر سنوات أو من رعايا الدول العربية المجازين شرط المعاملة بالمثل وان لا يقل عمره عن /25/ سنة ميلادية والا يزيد على /50/ سنة ميلادية.","غير محكوم بإحدى الجرائم التي تمس الأمانة أو الشرف أو احدى الجرائم الاقتصادية.","غير مسرح لسبب يمس النزاهة أو شرف الوظيفة بناءً على حكم قضائي مكتسب الدرجة القطعية.","أن يكون حائزاً على إجازة جامعية من إحدى كليات الاقتصاد أو ما يعادلها، اختصاص محاسبة أو اختصاصات أخرى شرط توفر عدد معين من المقررات في مادة المحاسبة يحددها المجلس من جامعات الجمهورية العربية السورية أو ما يعادلها وفق قرار التعادل الصادر عن لجنة تعادل الشهادات العلمية لدى وزارة التعليم العالي.","جميع ما سبق."],correct:4},
{text:"من المسؤول عن الإشراف على امتحان شهادة المحاسب القانوني؟",options:["وزارة التعليم العالي.","التنظيم المهني بمفرده.","لجنة القبول والإشراف على الامتحان (بمؤازرة وزارة المالية)."],correct:2},
{text:"كم مرة يتم إجراء امتحان شهادة المحاسب القانوني على الأقل سنوياً؟",options:["مرة واحدة.","مرتين.","ثلاث مرات."],correct:0},
{text:"لا تصح اجتماعات لجنة القبول والإشراف على الامتحان إلا بحضور:",options:["ثلاثة أعضاء.","خمسة أعضاء على الأقل منهم رئيس اللجنة.","جميع الأعضاء."],correct:1},
{text:"أين يؤدي الناجحون في امتحان شهادة المحاسب القانوني اليمين القانونية؟",options:["أمام مجلس المحاسبة والتدقيق.","أمام محكمة البداية في مركز المحافظة.","أمام التنظيم المهني."],correct:1},
{text:"هل تخول شهادة المحاسب القانوني حاملها الحق في ممارسة المهنة مباشرة؟",options:["نعم، فور الحصول عليها.","لا، إلا بعد إتمام التدريب المنصوص عليه في القانون.","لا، إلا بعد الحصول على الماجستير."],correct:1},
{text:"بعد القيد في السجل العام، يعتبر المحاسب القانوني عضواً في التنظيم المهني أي نوع من العضوية؟",options:["عضواً عاملاً فوراً.","عضواً مؤازراً.","عضواً منتسباً."],correct:1},
{text:"من الذي يمسك السجل العام للمحاسبين القانونيين؟",options:["التنظيم المهني.","وزارة المالية.","أمانة سر مجلس المحاسبة والتدقيق."],correct:2},
{text:"أي من السجلات التالية لا يمسكها التنظيم المهني حسب المادة /18/؟",options:["سجل المحاسبين المهنيين.","سجل المزاولين.","سجل العمال."],correct:2},
{text:"يلحق بجدول المزاولين جدولان هما: جدول شركات الأشخاص وجدول:",options:["شركات التوصية.","شركات الأموال.","المؤسسات الفردية."],correct:1},
{text:"تجدد رخص مزاولة المهنة:",options:["كل 3 سنوات.","كل 5 سنوات.","سنوياً."],correct:2},
{text:"متى يعتبر المحاسب القانوني عضواً عاملاً في التنظيم المهني؟",options:["فور اجتيازه الامتحان.","بعد حصوله على الرخصة.","بعد أداء اليمين."],correct:1},
{text:"المادة /46/، يحتفظ المحاسبون القانونيون بأوراق العمل مدة:",options:["سنتان من تاريخ التدقيق.","بمجرد انتهاء التكليف الضريبي.","خمس سنوات من تاريخ التدقيق."],correct:2},
{text:"مهنة المحاسب القانوني هي مهنة:",options:["حرفية تجارية.","علمية فكرية مستقلة.","إدارية تابعة."],correct:1},
{text:"لا يجوز للمتدرب أن:",options:["يحضر أمام الدوائر المالية بصفته وكيلاً عن المحاسب القانوني.","الانقطاع عن التدريب مدة تزيد على ستين يوماً سنوياً.","يقدم بحثاً تطبيقياً."],correct:1},
{text:"مدة الانقطاع المسموح بها للمتدرب عن التدريب سنوياً كحد أقصى هي:",options:["30 يوماً.","60 يوماً.","90 يوماً."],correct:1},
{text:"من الذي يحدد الحد الأدنى لمكافأة المحاسب تحت التدريب؟",options:["وزارة المالية.","مجلس إدارة التنظيم المهني.","المحاسب القانوني المشرف فقط."],correct:1},
{text:"لقب 'محاسب قانوني أو مدقق حسابات' لا يجوز استعماله من قبل:",options:["حاملي الشهادة فقط.","غير الأشخاص المرخصين والمسجلين في التنظيم المهني أصولاً.","الطلاب الجامعيين."],correct:1},
{text:"ما هي المهلة الممنوحة للمحاسب القانوني بعد تبليغه قرار منحه الرخصة لإعلام التنظيم المهني بعنوان مكتبه الذي سيمارس فيه المهنة؟",options:["3 أشهر.","6 أشهر.","سنة."],correct:1},
{text:"مع مراعاة مبدأ استقلالية المحاسب القانوني يحق له الحضور أمام الدوائر المالية واللجان المالية ذات الاختصاص القضائي للقيام بالأعمال المتصلة بمهامه بموجب:",options:["قرار مجلس الإدارة.","وكالة أو تفويض أصولاً.","قرار مدير الشركة."],correct:1},
{text:"لا يجوز للمحاسب القانوني إبداء الرأي على بيانات مالية دون:",options:["الحصول على توقيع الإدارة.","أن يكون قد قام بإجراءات تدقيق وحصل على أدلة مناسبة.","انتظار موافقة التنظيم المهني."],correct:1},
{text:"تقع مسؤولية إعداد البيان الضريبي على عاتق:",options:["المحاسب القانوني وحده.","المكلف (صاحب العلاقة).","مجلس المحاسبة والتدقيق."],correct:1},
{text:"يحظر على المحاسب القانوني تدقيق البيانات الضريبية في حال:",options:["قيامه بالمشاركة في تنظيم دفاتر المكلف أو حساباته.","كان موظفاً سابقاً في الشركة (لمدة تزيد عن /4/ سنوات).","كان قريباً لأحد الموظفين."],correct:0},
{text:"على المحاسب القانوني أن يراعي بدقة الواجبات التي تفرضها عليه:",options:["القرارات الواردة باجتماعات مجلس الإدارة.","أحكام هذا القانون وقواعد المهنة وأعرافها.","رغبة العميل فقط."],correct:1},
{text:"هل يسمح للمحاسب القانوني المتفرغ بالقيام بأعمال التجارة؟",options:["نعم، إذا كانت بسيطة.","لا، يحظر عليه ذلك.","نعم، بموافقة العميل."],correct:1},
{text:"يحق للمحاسب القانوني تدقيق شركة:",options:["يقوم بتنظيم حساباتها.","كان موظفاً سابقاً فيها ومضى على تركه العمل أربع سنوات.","كان موظفاً سابقاً فيها ومضى على تركه العمل سنتين."],correct:1},

{text:"على المحاسب القانوني عند قيامه بعمله (المادة /43/):",options:["الاعتماد على المعلومات التي يعطيها المدير فقط.","الاطلاع على الدفاتر المحاسبية والمستندات المؤيدة لها وطلب موافاته بما يراه ضرورياً لقيامه بمهمته والالتزام بالموضوعية والحياد وتنظيم أوراق العمل المناسبة.","عدم مراجعة أوراق عمل أعضاء فريق التدقيق."],correct:1},

{text:"وفق المادة /43/، يجب على المحاسب القانوني الالتزام بـ:",options:["الموضوعية والحياد والاستقلال التام في أداء المهام.","تنفيذ أوامر الإدارة مهما كانت.","تقليل أتعابه للمنافسة."],correct:0},

{text:"على المحاسب القانوني أن يقوم بمراجعة الأعمال التي يكلف بها:",options:["أعضاء فريق التدقيق الذين يعملون تحت إشرافه.","أعضاء مجلس الإدارة.","المدققين السابقين."],correct:0},
{text:"وفق المادة /44/، هل يجب أن يكون الاتفاق على تدقيق البيان الضريبي كتابياً؟",options:["لا، يكفي شفهياً.","نعم، يجب أن يكون مكتوباً ويحدد بوضوح مسؤوليات كل طرف.","نعم، ويجب أن يكون موثقاً من كاتب العدل."],correct:1},

{text:"وفق المادة /47/، هل يجوز للمحاسب القانوني تفويض غيره لممارسة المهنة بدلاً عنه؟",options:["نعم، لأي شخص يثق به.","لا، يجب أن يمارس المهنة شخصياً (مع حق الاستعانة بمساعدين على مسؤوليته).","نعم، بعد موافقة التنظيم المهني."],correct:1},
{text:"وفق المادة /48/، يحظر على المحاسب القانوني المزاول تولي الوظائف العامة أو الخاصة (براتب أو بتعويض). مع استثناء كلاً من؟",options:["جميع المحاسبين القانونيين المرخصين.","أساتذة الجامعات المزاولين للمهنة وفق أحكام قانون تنظيم الجامعات والمحاسبين القانونيين المكلفين بإدارة التنظيم المهني.","المحاسبين الذين لديهم خبرة أكثر من /10/ سنوات."],correct:1},

{text:"وفق المادة /48/، يحظر على المحاسب القانوني المزاول القيام بالدعاية لنفسه:",options:["بأي وسيلة كانت.","بطريقة مخلة بمكانة المهنة أو بشكل لا يتفق مع تقاليدها.","إلا بعد موافقة التنظيم المهني."],correct:1},
{text:"متى يجوز للمحاسب القانوني إفشاء المعلومات والأسرار التي اطلع عليها من خلال عمله وفق المادة /48/؟",options:["أبداً (لا يجوز إفشاؤها تحت أي ظرف).","بعد 5 سنوات من انتهاء العقد.","بناءً على طلب قضائي."],correct:2},

{text:"ما هو الحد الأدنى لعدد العاملين في شركة التدقيق (عدا الشركاء)؟",options:["شخصان.","ستة أشخاص على الأقل.","خمسة أشخاص."],correct:1},

{text:"وفق المادة /76/، ما هي الجهات التي تلتزم باعتماد مدقق حسابات:",options:["الشركات المساهمة وذات المسؤولية المحدودة.","شركات التضامن والتوصية البسيطة التي يزيد رأسمالها أو حجم مبيعاتها السنوية على عشرة ملايين ليرة سورية.","المؤسسات أو الشركات التي ينطبق عليها حد التسجيل وفقاً للتشريعات الضريبية النافذة.","النقابات والجمعيات التي تنص أنظمتها على اعتماد مدقق حسابات.","كل ما سبق."],correct:4},

{text:"أي من التالي ليس من عقوبات لجنة التأديب؟",options:["التنبيه الخطي.","غرامة مالية تصل إلى مليون ليرة.","إلغاء الرخصة."],correct:1},
{text:"متى تخضع قرارات لجنة التأديب لمصادقة المجلس؟",options:["عندما تتضمن التنبيه الخطي.","عندما تتضمن الإيقاف أو إلغاء الرخصة.","عندما تتضمن الإنذار الخطي."],correct:1},
{text:"كم المدة التي يسقط فيها حق ملاحقة مدققي الحسابات وفق هذا القانون (مع الاحتفاظ بأحكام قوانين الضرائب والرسوم)؟",options:["سنة من تاريخ تقديم التقرير.","سنتان من تاريخ تقديم التقرير.","ثلاث سنوات من تاريخ تقديم التقرير."],correct:1},
{text:"عقوبة من ينتحل صفة مدقق حسابات أو يمارس المهنة دون وجه حق هي:",options:["غرامة مالية فقط.","الحبس مدة لا تزيد على سنة ولا تقل عن شهر واحد (إضافة لعقوبات أخرى).","الإيقاف عن العمل الحكومي."],correct:1}
];

var total=QUESTIONS.length,current=0,answers=[],checked=[],started=false,done=false,app=document.getElementById('app');
for(var i=0;i<total;i++){answers[i]=null;checked[i]=false;}
function letter(i){var l=['أ','ب','ج','د','ه'];return l[i]||'';}
function countChecked(){var c=0;for(var i=0;i<checked.length;i++){if(checked[i])c++;}return c;}
function startScreen(){
var h='<div class="title">القانون رقم /33/ لعام 2009</div><div class="sub">تنظيم مهنة المحاسبة والتدقيق</div><div class="preptext">اختبار تفاعلي — الدورة التحضيرية لفحص المحاسب القانوني</div><div class="prep">إعداد المحاسب القانوني<br>ماهر وهبي</div><div class="count">📚 عدد الأسئلة: '+total+' سؤالاً</div><div class="disc">⚠️ تنبيه: هذه الأسئلة نماذج استرشادية للاستئناس فقط<br>يرجى الرجوع إلى النصوص القانونية الواردة في القانون رقم /33/ عند الدراسة</div><button class="startbtn" onclick="started=true;showQ();">▶ ابدأ الاختبار</button>';
app.innerHTML=h;
}
function showQ(){
if(!started){startScreen();return;}
if(done){showResult();return;}
var q=QUESTIONS[current],isCh=checked[current],sel=answers[current];
var h='<div class="prep" style="border-top:none;padding-top:0;margin-top:0;">إعداد المحاسب القانوني: ماهر وهبي</div><div class="progress"><span class="qcounter">السؤال '+(current+1)+' من '+total+'</span><span class="qscore">✅ تم الإجابة: '+countChecked()+'/'+total+'</span></div><div class="qtext">'+q.text+'</div><ul class="options">';
for(var i=0;i<q.options.length;i++){
var cls='opt';
if(isCh){
if(i===q.correct)cls+=' correct';
if(sel===i && i!==q.correct)cls+=' wrong';
cls+=' disabled';
}
var pe=isCh?'pointer-events:none;':'';
h+='<li class="'+cls+'" data-idx="'+i+'" style="'+pe+'"><span class="prefix">'+letter(i)+'</span><span>'+q.options[i]+'</span></li>';
}
h+='</ul>';
if(isCh){
var fc=(sel===q.correct)?'fbgood':'fbbad';
var ft=(sel===q.correct)?'✅ إجابتك صحيحة! ✓':'❌ إجابتك خاطئة.<br> الإجابة الصحيحة هي: '+letter(q.correct);
h+='<div class="feedback '+fc+'">'+ft+'</div>';
}else{h+='<div class="feedback" style="display:none;"></div>';}
var isLast=(current===total-1);
var nextBtn=isLast?'<div class="nav submit" onclick="finish()">✍️ إنهاء</div>':'<div class="nav next" onclick="goNext()">التالي ▶</div>';
h+='<div class="actions"><div class="nav" onclick="goPrev()">◀ السابق</div>'+nextBtn+'</div>';
app.innerHTML=h;
if(!isCh){
var opts=document.querySelectorAll('.opt');
for(var j=0;j<opts.length;j++){
(function(el){
el.onclick=function(){
var idx=parseInt(el.dataset.idx);
if(!isNaN(idx) && !checked[current]){
answers[current]=idx;
checked[current]=true;
showQ();
}
};
})(opts[j]);
}
}
}
function goPrev(){if(current>0){current--;showQ();}}
function goNext(){if(current<total-1){current++;showQ();}}
function finish(){var rem=total-countChecked();if(rem>0 && !confirm('لديك '+rem+' سؤالاً لم يتم الإجابة عليه. هل تريد إنهاء الاختبار؟'))return;done=true;showResult();}
function showResult(){
var s=0;for(var i=0;i<total;i++){if(answers[i]!==null && answers[i]===QUESTIONS[i].correct)s++;}
var pct=Math.round((s/total)*100);
var msg='';if(pct>=80)msg='🎉 ممتاز! أداء رائع 🎉';else if(pct>=60)msg='👍 جيد جداً، يمكنك التحسن أكثر 👍';else if(pct>=40)msg='📚 جيد، حاول مراجعة المعلومات 📚';else msg='💪 لا تقلق، تعلم من أخطائك وحاول مجدداً 💪';
var h='<div class="result-title">🏆 نتيجة الاختبار 🏆</div><div class="prep">إعداد المحاسب القانوني: ماهر وهبي</div><div class="final-score">'+s+' / '+total+'</div><div class="final-msg">'+msg+'</div><div style="text-align:center;margin:10px 0;"><span class="qscore" style="background:#0a2a4a;padding:6px 18px;border-radius:12px;">النسبة: '+pct+'%</span></div><button class="btn-restart" onclick="location.reload()">🔄 إعادة الاختبار من البداية</button><div class="footer-disc">⚠️ تنبيه: الأسئلة أعلاه هي نماذج استرشادية للاستئناس فقط.<br>يرجى الرجوع إلى النصوص القانونية الواردة في القانون رقم /33/ عند الدراسة.</div>';
app.innerHTML=h;
}
startScreen();
</script>
</body>
</html>
